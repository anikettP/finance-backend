openapi: 3.0.0
info:
  title: Finance Dashboard API
  description: A professional-grade finance backend for managing records and analyzing data.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string, format: password }
                role: { type: string, enum: [viewer, analyst, admin] }
      responses:
        201:
          description: User registered successfully

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string, format: password }
      responses:
        200:
          description: Login successful

  /records:
    get:
      summary: Get all records (with filtering & pagination)
      tags: [Records]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [income, expense] }
        - name: category
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        200:
          description: List of records
    post:
      summary: Create a record (Admin only)
      tags: [Records]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, type, category]
              properties:
                amount: { type: number }
                type: { type: string, enum: [income, expense] }
                category: { type: string }
                note: { type: string }
      responses:
        201:
          description: Record created

  /dashboard/summary:
    get:
      summary: Get dashboard totals and summaries (Analyst/Admin)
      tags: [Dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Dashboard summary data

  /dashboard/monthly:
    get:
      summary: Get monthly income vs expense trend (Analyst/Admin)
      tags: [Dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Monthly trend data
